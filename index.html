<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Surface</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  </head>

  <body>
    <h1>MIDI Control Surface</h1>

    <button id="mode-toggle-btn">Enter Edit Mode</button>
    <div id="status">Connecting to bridge...</div>

    <div class="pad-container">
      <button class="midi-pad" data-cc="14">
        Pad 1<br />(CC 14)
      </button>
      <button class="midi-pad" data-cc="15">
        Pad 2<br />(CC 15)
      </button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
