<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>DAW Controller</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">

      <header id="top-bar">
        <div id="transport-strip">
          <button class="transport-btn" data-action="rewind" title="Rewind">◀◀</button>
          <button class="transport-btn" data-action="play"   title="Play">▶</button>
          <button class="transport-btn" data-action="stop"   title="Stop">■</button>
          <button class="transport-btn" data-action="record" title="Record">●</button>
          <button class="transport-btn" data-action="loop"   title="Loop/Cycle">⟳</button>
        </div>
        <div id="macro-strip"></div>
        <div id="top-controls">
          <span id="status" class="status connecting">Connecting…</span>
          <button id="edit-toggle">Edit</button>
        </div>
      </header>

      <nav id="tab-bar">
        <!-- instrument tabs injected by app.js -->
      </nav>

      <main id="workspace">
        <aside id="fader-bank">
          <!-- faders injected by app.js -->
        </aside>
        <section id="articulation-grid">
          <div id="art-empty-state">
            <p>Import a Cubase expression map to get started</p>
            <button id="import-hint-btn">+ Import Expression Map</button>
          </div>
        </section>
      </main>

    </div>

    <div id="drop-overlay" class="hidden">
      <div id="drop-message">Drop .expressionmap Files Here</div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
