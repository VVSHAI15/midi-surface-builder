<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI Surface</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  </head>

  <body>
    <h1>MIDI Control Surface</h1>

    <button id="mode-toggle-btn">Enter Edit Mode</button>
    <div id="status">Connecting to bridge...</div>

    <div id="toolbar">
      <button id="add-pad-btn">+ Add Pad</button>
      <button id="add-fader-btn">+ Add Fader</button>
      <button id="clear-btn" style="background-color: #7b2020;">Clear All</button>
    </div>

    <div class="pad-container" id="canvas"></div>

    <div id="property-inspector">
      <h3>Properties</h3>
      
      <label>Label Text:
        <input type="text" id="prop-text" placeholder="e.g. Swells">
      </label>
      
      <label>Color:
        <input type="color" id="prop-color">
      </label>
      
      <label>MIDI CC:
        <input type="number" id="prop-cc" min="0" max="127">
      </label>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
